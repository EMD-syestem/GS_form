<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Permohonan Kendaraan</title>

  <link rel="stylesheet" href="style.css">
  
   <!--  Favicon untuk Browser, Mobile, dan Desktop -->
  <link rel="icon" type="image/png" sizes="16x16" href="https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg">
  <link rel="icon" type="image/png" sizes="32x32" href="https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg">
  <link rel="icon" type="image/png" sizes="48x48" href="https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg">
  <link rel="icon" type="image/png" sizes="64x64" href="https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg">
  <link rel="icon" type="image/png" sizes="180x180" https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg">
  <link rel="shortcut icon" href="https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg" type="image/png">
  
</head>
<body>
  
  <!-- SPLASH SCREEN -->

<div id="splashScreen">

  <div class="splash-content">

    <img
      src="https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg"
      alt="GS Dispatcher"
    >

    <h1>
      Selamat Datang
    </h1>

    <p>
      Di Reservasi Kendaraan
      <br>
      General Service Pertamina Field Jambi
    </p>

  </div>

</div>

  <div class="container">

    <div class="card">

      <div class="header-icon">
        <img src="https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg" alt="GS Dispatcher">
      </div>

      <h2>Form Permohonan Kendaraan</h2>

      <p class="subtitle">
        Silakan isi data permohonan kendaraan dinas
      </p>

      <form id="formPermohonan">

        <div class="form-group">
          <label for="pemohon">
            Pemohon Kendaraan
          </label>

          <input type="text" id="pemohon" placeholder="Masukan nama dan No handphone" required>
        </div>
        
        <div class="form-group">
          <label for="fungsi">
            Fungsi
          </label>
          
          <input type="text" id="fungsi" placeholder="Masukan nama fungsi/departement" required>
        </div>
        
        <div class="form-group">
          <label for="jumlahkendaraan">
           Jumlah kendaraan yang digunakan
          </label>
          
          <input type="text" id="jumlahkendaraan" placeholder="masukan jumlah kendaraan yang di butuhkan" required>
        </div>
               
        <div class="form-group">
          <label for="tglPermohonan">
            Tanggal Permohonan
          </label>

          <input type="date" id="tglPermohonan" required>
        </div>

        <div class="form-group">
          <label for="tglMulai">
            Tanggal Mulai Tugas
          </label>

          <input type="date" id="tglMulai" required>
        </div>

        <div class="form-group">
          <label for="tglSelesai">
            Tanggal Selesai Tugas
          </label>

          <input type="date" id="tglSelesai" required>
        </div>

        <div class="row">

          <div class="form-group half">
            <label for="jamMulai">
              Jam Mulai Tugas
            </label>

            <input type="time" id="jamMulai" required>
          </div>

          <div class="form-group half">
            <label for="jamSelesai">
              Jam Selesai Tugas
            </label>

            <input type="time" id="jamSelesai" required>
          </div>

        </div>

        <div class="form-group">
          <label for="summaryPekerjaan">
            Summary Pekerjaan / Keterangan
          </label>

          <textarea id="summaryPekerjaan" rows="4" placeholder="Masukkan deskripsi peminjaman kendaraan" required></textarea>
        </div>

        <div class="button-row">

  <button
    type="submit"
    class="btn-submit">

    Simpan Permohonan

  </button>

 <button
    type="button"
    class="btn-check"
    onclick="openReservationModal()">

    Cek Status Reservasi
 </button>
          
   <button
    type="button"
    class="btn-status"
    onclick="openstatuskendaraan()">

     Status Kendaraan

</button>


</div>


      </form>

    </div>

  </div>
  
  

     <!-- ================= STATUS KENDARAAN ================= -->

<div id="kendaraanModal" class="reservation-modal">

    <div class="reservation-modal-content">

        <div class="reservation-modal-header">

            <h2>Status Kendaraan KRP POOL GS</h2>

            <span class="reservation-close"
                  onclick="closeKendaraanModal()">
                &times;
            </span>

        </div>

        <div id="kendaraanList"></div>

    </div>

</div>
  
  <div id="reservationModal" class="reservation-modal">

    <div class="reservation-modal-content">

        <div class="reservation-modal-header">

            <h2>Status Reservasi</h2>

            <span class="reservation-close"
                  onclick="closeReservationModal()">
                &times;
            </span>

        </div>

        <div class="form-group">

            <label>Nama Pemohon</label>

            <input
                id="searchReservation"
                placeholder="Masukkan nama dan No. Handphone">

        </div>

        <button
            class="btn-search"
            onclick="cekReservasi()">

            Cari Reservasi

        </button>

        <div id="reservationResult"></div>

    </div>

</div>
  
  <!-- SUCCESS SCREEN -->

<div id="successScreen">

  <div class="success-content">

    <img
      src="https://i.postimg.cc/NMRDPgT5/GS-dispacer.jpg"
      alt="GS Dispatcher"
    >

    <h1>
      Permintaan Berhasil Dikirim
    </h1>

    <p>
      Selamat bertugas.<br>
      Semoga selamat sampai tujuan.<br>
      Terima kasih.
    </p>

  </div>

</div>

 <script type="module" src="firebase.js"></script>
<script src="script.js"></script>
 
  </body>
  
</html>
